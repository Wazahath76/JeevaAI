spring:
  application:
    name: medicore-hms

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medicore_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:wajju7861}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        temp:
          use_jdbc_metadata_defaults: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvck1lZGlDb3JlSE1TUHJvZHVjdGlvbjIwMjQ=}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:86400000}
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-20250514
  api-url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
  max-tokens: ${ANTHROPIC_MAX_TOKENS:1000}
  timeout-seconds: ${ANTHROPIC_TIMEOUT:30}

logging:
  level:
    com.medicore: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never